workflows:
  ios-only:
    name: Build iOS IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build iOS (no codesign)
        script: |
          # Genera la build (crea la cartella .app ma non l'ipa)
          flutter build ios --release --no-codesign
          
          # Crea manualmente la struttura per il file IPA
          mkdir -p build/ios/iphoneos/Payload
          
          # Copia l'app compilata nella cartella Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          
          # Comprime la cartella in un file .ipa scaricabile
          cd build/ios/iphoneos && zip -r manual_build.ipa Payload

    artifacts:
      # Ora puntiamo al file creato manualmente
      - build/ios/iphoneos/*.ipa

    publishing:
      email:
        recipients:
          - robyalaimo85@gmail.com